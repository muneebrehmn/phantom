[pytest]
# phantom/pytest.ini
# Configuration for the Phantom test suite.

# asyncio mode: auto — marks all async test functions without needing @pytest.mark.asyncio
# Requires: pip install pytest-asyncio
asyncio_mode = auto

# Test discovery
testpaths = tests

# Output verbosity
addopts =
    -v
    --tb=short
    --strict-markers

# Register custom markers (prevents PytestUnknownMarkWarning)
markers =
    slow: marks tests that fire real HTTP requests (deselect with -m "not slow")
    integration: marks tests requiring a live target